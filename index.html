<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ricerca Parcheggi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
font-family:sans-serif;
}

#controls{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(6px);
padding:8px;
display:flex;
flex-direction:column;
gap:6px;
position:relative;
z-index:1000;
}

#via{
padding:10px;
font-size:16px;
border-radius:25px;
border:1px solid #ccc;
}

#suggestions{
background:rgba(255,255,255,0.9);
border-radius:8px;
max-height:150px;
overflow:auto;
display:none;
}

#suggestions div{
padding:8px;
cursor:pointer;
}

#suggestions div:hover{
background:#eee;
}

#opzioni{
display:flex;
gap:6px;
}

#opzioni button{
flex:1;
padding:10px;
border-radius:25px;
border:2px solid #ccc;
background:rgba(255,255,255,0.7);
}

#opzioni button.attivo{
border-color:green;
}

#rigaCerca{
display:flex;
gap:6px;
}

#rigaCerca select,
#rigaCerca button{
flex:1;
padding:10px;
border-radius:25px;
border:1px solid #ccc;
background:rgba(255,255,255,0.7);
}

#map{
height:60vh;
z-index:1;
}

#risultati{
padding:10px;
font-size:16px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(6px);
position:relative;
z-index:1000;
}

#menuBtn{

position:fixed;
bottom:20px;
right:20px;

width:50px;
height:50px;

border-radius:50%;
border:none;

font-size:26px;
background:rgba(255,255,255,0.9);

z-index:2000;

}

#settings{

position:fixed;

bottom:80px;
right:20px;

background:rgba(255,255,255,0.9);

padding:12px;

border-radius:12px;

border:1px solid #ccc;

display:none;

z-index:2000;

width:230px;

}

#settings input{

width:100%;

padding:8px;

margin-bottom:8px;

border-radius:6px;

border:1px solid #ccc;

}

</style>

</head>

<body>

<div id="controls">

<input id="via" placeholder="Cerca indirizzo">

<div id="suggestions"></div>

<div id="opzioni">
<button id="gpsBtn">Vicino a me</button>
<button id="casaBtn">Casa</button>
<button id="lavoroBtn">Lavoro</button>
</div>

<div id="rigaCerca">
<select id="raggio">
<option value="50">50 m</option>
<option value="100">100 m</option>
<option value="150">150 m</option>
</select>

<button id="cercaBtn">Cerca</button>
</div>

</div>

<div id="map"></div>

<div id="risultati"></div>

<button id="menuBtn">⋮</button>

<div id="settings">

<input id="inputCasa" placeholder="Indirizzo Casa">
<input id="inputLavoro" placeholder="Indirizzo Lavoro">

<button id="salvaIndirizzi">Salva indirizzi</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

let map=L.map("map").setView([41.9,12.5],16);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

let cluster=L.markerClusterGroup();
map.addLayer(cluster);

let punto=null;
let cerchio=null;
let ultimaPosizione=null;

function attiva(btn){

document.querySelectorAll("#opzioni button")
.forEach(b=>b.classList.remove("attivo"));

btn.classList.add("attivo");

}

function aggiornaPunto(lat,lng){

if(punto) map.removeLayer(punto);

punto=L.circleMarker([lat,lng],{
radius:8,
color:"white",
fillColor:"#007aff",
fillOpacity:1
}).addTo(map);

map.panTo([lat,lng]);

ultimaPosizione={lat,lng};

}

function distanza(lat1,lng1,lat2,lng2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function pulisci(){

cluster.clearLayers();

if(cerchio){
map.removeLayer(cerchio);
cerchio=null;
}

}

function generaParcheggi(lat,lng){

let arr=[];

for(let i=0;i<15;i++){

arr.push({
lat:lat+(Math.random()-0.5)/1500,
lng:lng+(Math.random()-0.5)/1500,
libero:Math.random()>0.4
});

}

for(let i=0;i<15;i++){

arr.push({
lat:lat+(Math.random()-0.5)/800,
lng:lng+(Math.random()-0.5)/800,
libero:Math.random()>0.4
});

}

return arr;

}

function disegna(lat,lng){

const raggio=Number(document.getElementById("raggio").value);

pulisci();

cerchio=L.circle([lat,lng],{
radius:raggio,
fillColor:"#3388ff",
fillOpacity:0.15,
color:null
}).addTo(map);

const parcheggi=generaParcheggi(lat,lng);

let tot=0;
let liberi=0;

parcheggi.forEach(p=>{

const dist=distanza(lat,lng,p.lat,p.lng);

if(dist<=raggio){

tot++;

if(p.libero) liberi++;

const marker=L.circleMarker([p.lat,p.lng],{
radius:7,
color:"#000",
fillColor:p.libero?"green":"red",
fillOpacity:0.9
});

cluster.addLayer(marker);

}

});

document.getElementById("risultati").innerHTML=
"Parcheggi totali: "+tot+"<br>Parcheggi liberi: "+liberi;

}

function cerca(lat,lng){

aggiornaPunto(lat,lng);
disegna(lat,lng);

}

async function cercaIndirizzo(ind){

const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(ind);

const res=await fetch(url);
const data=await res.json();

if(data.length==0){
alert("Indirizzo non trovato");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

cerca(lat,lon);

}

document.getElementById("via").addEventListener("input",async function(){

const q=this.value;

if(q.length<3){
suggestions.style.display="none";
return;
}

const url="https://nominatim.openstreetmap.org/search?format=json&q="+q;

const res=await fetch(url);
const data=await res.json();

suggestions.innerHTML="";
suggestions.style.display="block";

data.slice(0,5).forEach(place=>{

let parts=place.display_name.split(",");

let text=parts[0]+" , "+parts[2];

const div=document.createElement("div");

div.textContent=text;

div.onclick=()=>{

via.value=text;

suggestions.style.display="none";

cercaIndirizzo(place.display_name);

};

suggestions.appendChild(div);

});

});

document.getElementById("cercaBtn
