<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ricerca Parcheggi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:sans-serif;
}

#controls{
background:#f3f3f3;
padding:8px;
display:flex;
flex-direction:column;
gap:6px;
}

#via{
padding:10px;
font-size:16px;
border-radius:25px;
border:1px solid #ccc;
}

#opzioni{
display:flex;
gap:6px;
}

#opzioni button{
flex:1;
padding:10px;
border-radius:25px;
border:2px solid #ccc;
background:white;
font-size:14px;
}

#opzioni button.attivo{
border-color:green;
}

#rigaCerca{
display:flex;
gap:6px;
}

#rigaCerca select,
#rigaCerca button{
flex:1;
padding:10px;
border-radius:25px;
border:1px solid #ccc;
}

#map{
height:60vh;
}

#risultati{
padding:10px;
font-size:16px;
background:white;
}

#menuBtn{

position:fixed;
bottom:20px;
right:20px;

width:50px;
height:50px;

border-radius:50%;
border:none;

font-size:26px;
background:white;

z-index:2000;

box-shadow:0 2px 8px rgba(0,0,0,0.2);

}

#settings{

position:fixed;

bottom:80px;
right:20px;

background:white;

padding:12px;

border-radius:12px;

border:1px solid #ccc;

display:none;

z-index:2000;

width:230px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

}

#settings input{

width:100%;

padding:8px;

margin-bottom:8px;

border-radius:6px;

border:1px solid #ccc;

}

#settings button{

width:100%;

padding:8px;

border-radius:6px;

border:1px solid #ccc;

background:#f5f5f5;

}

</style>

</head>

<body>

<div id="controls">

<input id="via" placeholder="Cerca indirizzo">

<div id="opzioni">
<button id="gpsBtn">Vicino a me</button>
<button id="casaBtn">Casa</button>
<button id="lavoroBtn">Lavoro</button>
</div>

<div id="rigaCerca">
<select id="raggio">
<option value="50">50 m</option>
<option value="100">100 m</option>
<option value="150">150 m</option>
</select>

<button id="cercaBtn">Cerca</button>
</div>

</div>

<div id="map"></div>

<div id="risultati"></div>

<button id="menuBtn">⋮</button>

<div id="settings">

<input id="inputCasa" placeholder="Indirizzo Casa">

<input id="inputLavoro" placeholder="Indirizzo Lavoro">

<button id="salvaIndirizzi">Salva indirizzi</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map=L.map("map").setView([41.9,12.5],16);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

let punto=null;
let cerchio=null;
let markers=[];
let ultimaPosizione=null;



function attiva(btn){

document.querySelectorAll("#opzioni button")
.forEach(b=>b.classList.remove("attivo"));

btn.classList.add("attivo");

}



function aggiornaPunto(lat,lng){

if(punto) map.removeLayer(punto);

punto=L.circleMarker(
[lat,lng],
{
radius:8,
color:"white",
fillColor:"#007aff",
fillOpacity:1
}
).addTo(map);

map.panTo([lat,lng]);

ultimaPosizione={lat,lng};

}



function distanza(lat1,lng1,lat2,lng2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}



function pulisci(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

if(cerchio){
map.removeLayer(cerchio);
cerchio=null;
}

}



function generaParcheggi(lat,lng){

let arr=[];

for(let i=0;i<15;i++){

arr.push({

lat:lat+(Math.random()-0.5)/2000,
lng:lng+(Math.random()-0.5)/2000,
libero:Math.random()>0.4

});

}

return arr;

}



function disegna(lat,lng){

const raggio=Number(document.getElementById("raggio").value);

pulisci();

cerchio=L.circle(
[lat,lng],
{
radius:raggio,
fillColor:"#3388ff",
fillOpacity:0.15,
color:null
}
).addTo(map);

const parcheggi=generaParcheggi(lat,lng);

let tot=0;
let liberi=0;

parcheggi.forEach(p=>{

const dist=distanza(lat,lng,p.lat,p.lng);

if(dist<=raggio){

tot++;

if(p.libero) liberi++;

const marker=L.circleMarker(
[p.lat,p.lng],
{
radius:7,
color:"#000",
fillColor:p.libero?"green":"red",
fillOpacity:0.9
}
).addTo(map);

markers.push(marker);

}

});

document.getElementById("risultati").innerHTML=
"Parcheggi totali: "+tot+"<br>Parcheggi liberi: "+liberi;

}



function cerca(lat,lng){

aggiornaPunto(lat,lng);
disegna(lat,lng);

}



async function cercaIndirizzo(ind){

const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(ind);

const res=await fetch(url);
const data=await res.json();

if(data.length==0){
alert("Indirizzo non trovato");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

cerca(lat,lon);

}



document.getElementById("via").addEventListener("keypress",function(e){

if(e.key==="Enter"){

const v=this.value.trim();

if(v!="") cercaIndirizzo(v);

}

});



document.getElementById("cercaBtn").onclick=()=>{

const v=document.getElementById("via").value.trim();

if(v!=""){
cercaIndirizzo(v);
return;
}

if(ultimaPosizione){
cerca(ultimaPosizione.lat,ultimaPosizione.lng);
}

};

let watchID = null;

document.getElementById("gpsBtn").onclick = function(){

attiva(this);

if(watchID !== null){
navigator.geolocation.clearWatch(watchID);
}

watchID = navigator.geolocation.watchPosition(

pos => {

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

aggiornaPunto(lat, lng);
disegna(lat, lng);

},

err => {
alert("Errore GPS");
},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
}

);

};

document.getElementById("casaBtn").onclick=function(){

attiva(this);

const ind=localStorage.getItem("indirizzoCasa");

if(ind) cercaIndirizzo(ind);
else alert("Inserisci casa nelle impostazioni");

};



document.getElementById("lavoroBtn").onclick=function(){

attiva(this);

const ind=localStorage.getItem("indirizzoLavoro");

if(ind) cercaIndirizzo(ind);
else alert("Inserisci lavoro nelle impostazioni");

};



document.getElementById("salvaIndirizzi").onclick=()=>{

const casa=document.getElementById("inputCasa").value.trim();
const lavoro=document.getElementById("inputLavoro").value.trim();

if(casa) localStorage.setItem("indirizzoCasa",casa);
if(lavoro) localStorage.setItem("indirizzoLavoro",lavoro);

alert("Indirizzi salvati");

};



const settings=document.getElementById("settings");

document.getElementById("menuBtn").onclick=()=>{

settings.style.display=
settings.style.display==="none"?"block":"none";

};

</script>

</body>
</html>
