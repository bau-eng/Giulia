<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parcheggi Smart</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3388ff">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body {
  margin:0;
  font-family:sans-serif;
}
#controls {
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:8px;
  background:#f2f2f2;
}
#inputVia input {
  width:100%;
  padding:10px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}
#opzioni {
  display:flex;
  gap:6px;
}
#opzioni button, #opzioni select {
  flex:1;
  padding:10px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}
#raggioCerca {
  display:flex;
  gap:6px;
  margin-top:6px;
}
#raggioCerca select, #raggioCerca button {
  flex:1;
  padding:10px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}
#map {
  height:calc(100vh - 160px);
  width:100%;
}
</style>
</head>
<body>

<div id="controls">

  <!-- Riga 1: Via -->
  <div id="inputVia">
    <input type="text" id="via" placeholder="Via e numero civico">
  </div>

  <!-- Riga 2: GPS + Luoghi -->
  <div id="opzioni">
    <button id="gpsBtn">Vicino a me</button>
    <select id="luoghi">
      <option value="">Seleziona luogo rapido</option>
    </select>
  </div>

  <!-- Riga 3: Raggio + Cerca -->
  <div id="raggioCerca">
    <select id="raggio">
      <option value="50">50 m</option>
      <option value="100">100 m</option>
      <option value="150">150 m</option>
    </select>
    <button id="cercaBtn">Cerca</button>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// ---------- MAPPA ----------
const map = L.map("map").setView([45.0,7.0],16);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);

let markers=[], cerchioRaggio=null, puntoUtente=null;
let primaVolta=true;

// ---------- LUOGHI RAPIDI ----------
let luoghiRapidi = JSON.parse(localStorage.getItem("luoghiRapidi") || '{}');

function aggiornaLuoghiSelect(){
  const select = document.getElementById("luoghi");
  select.innerHTML='<option value="">Seleziona luogo rapido</option>';
  for(const nome in luoghiRapidi){
    select.innerHTML += `<option value="${nome}">${nome}</option>`;
  }
}

// ---------- UTILI ----------
function pulisciParcheggi(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(cerchioRaggio){ map.removeLayer(cerchioRaggio); cerchioRaggio=null; }
}

function aggiornaPunto(lat,lng){
  if(puntoUtente) map.removeLayer(puntoUtente);
  puntoUtente=L.circleMarker([lat,lng],{
    radius:8,
    fillColor:"#007aff",
    color:"#ffffff",
    weight:2,
    fillOpacity:1
  }).addTo(map);
}

function distanzaMetri(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c=2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

// ---------- PARCHEGGI FINTI ----------
function generaParcheggi(lat,lng){
  return [
    {id:1,lat:lat+0.00018,lng:lng+0.00002,stato:"libero"},
    {id:2,lat:lat-0.00020,lng:lng+0.00004,stato:"libero"},
    {id:3,lat:lat+0.00045,lng:lng-0.00002,stato:"libero"}
  ];
}

// ---------- DISEGNA PARCHEGGI ----------
function disegnaParcheggi(parcheggi,lat,lng,raggio){
  pulisciParcheggi();
  cerchioRaggio=L.circle([lat,lng],{
    radius:raggio,
    color:null,
    fillColor:"#3388ff",
    fillOpacity:0.15,
    interactive:false
  }).addTo(map);

  parcheggi.forEach(p=>{
    const dist=distanzaMetri(lat,lng,p.lat,p.lng);
    if(dist<=raggio){
      const marker=L.circleMarker([p.lat,p.lng],{
        radius:7, fillColor:"green", color:"#000", weight:1, fillOpacity:0.9
      }).addTo(map).bindPopup(`Parcheggio ${p.id}<br>Distanza ${Math.round(dist)} m`);
      markers.push(marker);
    }
  });
}

// ---------- CERCA FUNZIONE ----------
function cerca(){
  const raggio=Number(document.getElementById("raggio").value);
  let lat,lng;

  const via=document.getElementById("via").value.trim();
  const luogo=document.getElementById("luoghi").value;

  if(via){
    // Simuliamo coordinate della via
    lat=45.1278; lng=7.6316;
  } else if(luogo){
    const indirizzo = luoghiRapidi[luogo];
    if(indirizzo){
      lat=indirizzo.lat; lng=indirizzo.lng;
    } else return;
  } else if(puntoUtente){
    const pos=puntoUtente.getLatLng();
    lat=pos.lat; lng=pos.lng;
  } else {
    alert("Seleziona via, luogo o GPS"); return;
  }

  aggiornaPunto(lat,lng);
  const parcheggi=generaParcheggi(lat,lng);
  disegnaParcheggi(parcheggi,lat,lng,raggio);
  // Zoom non modificato: non chiami map.setView([lat,lng],zoom)
}

// ---------- BUTTONS ----------
document.getElementById("gpsBtn").onclick=()=>{
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    aggiornaPunto(lat,lng);
  });
};

document.getElementById("cercaBtn").onclick=cerca;

// ---------- INIZIALIZZAZIONE ----------
aggiornaLuoghiSelect();

// Se vuoi aggiungere un nuovo luogo
function aggiungiLuogo(nome,lat,lng){
  luoghiRapidi[nome]={lat,lng};
  localStorage.setItem("luoghiRapidi",JSON.stringify(luoghiRapidi));
  aggiornaLuoghiSelect();
}

// Esempio: Casa, Lavoro, Scuola + Altro
if(!luoghiRapidi["Casa"]) aggiungiLuogo("Casa",45.128,7.632);
if(!luoghiRapidi["Lavoro"]) aggiungiLuogo("Lavoro",45.126,7.630);
if(!luoghiRapidi["Scuola"]) aggiungiLuogo("Scuola",45.127,7.634);
if(!luoghiRapidi["Altro"]) aggiungiLuogo("Altro",45.125,7.635);

</script>
</body>
</html>
