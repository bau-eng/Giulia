<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Parcheggi Smart</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
font-family:sans-serif;
}

#controls{
background:#f2f2f2;
padding:8px;
display:flex;
flex-direction:column;
gap:6px;
}

#via{
padding:10px;
border-radius:25px;
border:1px solid #ccc;
}

#suggestions{
background:white;
border:1px solid #ccc;
max-height:150px;
overflow:auto;
display:none;
}

#suggestions div{
padding:8px;
cursor:pointer;
}

#suggestions div:hover{
background:#eee;
}

#opzioni{
display:flex;
gap:6px;
}

#opzioni button{
flex:1;
padding:10px;
border-radius:25px;
border:2px solid #ccc;
background:white;
}

#opzioni button.attivo{
border-color:green;
}

#rigaCerca{
display:flex;
gap:6px;
}

#map{
height:60vh;
}

#risultati{
padding:10px;
font-size:16px;
}

#menuBtn{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
font-size:26px;
border:none;
background:white;
z-index:2000;
}

#settings{
position:fixed;
bottom:80px;
right:20px;
background:white;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
display:none;
z-index:2000;
width:220px;
}

#settings input{
width:100%;
margin-bottom:6px;
padding:6px;
}

</style>

</head>

<body>

<div id="controls">

<input id="via" placeholder="Cerca indirizzo">

<div id="suggestions"></div>

<div id="opzioni">
<button id="gpsBtn">Vicino a me</button>
<button id="casaBtn">Casa</button>
<button id="lavoroBtn">Lavoro</button>
</div>

<div id="rigaCerca">

<select id="raggio">
<option value="50">50 m</option>
<option value="100">100 m</option>
<option value="150">150 m</option>
</select>

<button id="cercaBtn">Cerca</button>

</div>

</div>

<div id="map"></div>

<div id="risultati"></div>

<button id="menuBtn">⋮</button>

<div id="settings">

<input id="inputCasa" placeholder="Indirizzo Casa">
<input id="inputLavoro" placeholder="Indirizzo Lavoro">

<button id="salvaIndirizzi">Salva</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

let map=L.map("map").setView([41.9,12.5],16);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

let markerCluster=L.markerClusterGroup();

map.addLayer(markerCluster);

let punto=null;
let cerchio=null;
let lastUpdate=null;

function attiva(btn){

document.querySelectorAll("#opzioni button")
.forEach(b=>b.classList.remove("attivo"));

btn.classList.add("attivo");

}

function aggiornaPunto(lat,lng){

if(punto) map.removeLayer(punto);

punto=L.circleMarker(
[lat,lng],
{radius:8,color:"white",fillColor:"#007aff",fillOpacity:1}
).addTo(map);

map.panTo([lat,lng]);

}

async function caricaParcheggi(lat,lng){

const raggio=document.getElementById("raggio").value;

markerCluster.clearLayers();

if(cerchio) map.removeLayer(cerchio);

cerchio=L.circle([lat,lng],{radius:raggio,fillColor:"#3388ff",fillOpacity:0.15}).addTo(map);

const query=`
[out:json];
(
node["amenity"="parking"](around:${raggio},${lat},${lng});
);
out;
`;

const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

const res=await fetch(url);

const data=await res.json();

let tot=data.elements.length;

let liberi=Math.floor(tot*0.5);

data.elements.forEach(p=>{

const marker=L.marker([p.lat,p.lon]);

marker.on("click",()=>{

const url="https://www.google.com/maps/dir/?api=1&destination="+p.lat+","+p.lon;

window.open(url,"_blank");

});

markerCluster.addLayer(marker);

});

document.getElementById("risultati").innerHTML=
"Parcheggi trovati: "+tot+"<br>Parcheggi liberi stimati: "+liberi;

}

async function cercaIndirizzo(ind){

const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(ind);

const res=await fetch(url);

const data=await res.json();

if(data.length==0){

alert("Indirizzo non trovato");
return;

}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

aggiornaPunto(lat,lon);

caricaParcheggi(lat,lon);

}

document.getElementById("cercaBtn").onclick=()=>{

const v=document.getElementById("via").value.trim();

if(v!="") cercaIndirizzo(v);

};

document.getElementById("via").addEventListener("input",async function(){

const q=this.value;

if(q.length<3){
suggestions.style.display="none";
return;
}

const url="https://nominatim.openstreetmap.org/search?format=json&q="+q;

const res=await fetch(url);

const data=await res.json();

suggestions.innerHTML="";
suggestions.style.display="block";

data.slice(0,5).forEach(place=>{

const div=document.createElement("div");

div.textContent=place.display_name;

div.onclick=()=>{

via.value=place.display_name;

suggestions.style.display="none";

cercaIndirizzo(place.display_name);

};

suggestions.appendChild(div);

});

});

document.getElementById("gpsBtn").onclick=function(){

attiva(this);

navigator.geolocation.watchPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

aggiornaPunto(lat,lng);

caricaParcheggi(lat,lng);

},{enableHighAccuracy:true});

};

document.getElementById("casaBtn").onclick=function(){

attiva(this);

const ind=localStorage.getItem("indirizzoCasa");

if(ind) cercaIndirizzo(ind);

};

document.getElementById("lavoroBtn").onclick=function(){

attiva(this);

const ind=localStorage.getItem("indirizzoLavoro");

if(ind) cercaIndirizzo(ind);

};

document.getElementById("salvaIndirizzi").onclick=()=>{

const casa=document.getElementById("inputCasa").value.trim();
const lavoro=document.getElementById("inputLavoro").value.trim();

if(casa) localStorage.setItem("indirizzoCasa",casa);
if(lavoro) localStorage.setItem("indirizzoLavoro",lavoro);

alert("Salvato");

};

menuBtn.onclick=()=>{

settings.style.display=
settings.style.display==="none"?"block":"none";

};

</script>

</body>
</html>
