<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parcheggi Smart</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:sans-serif;
}

#controls{
display:flex;
flex-direction:column;
gap:6px;
padding:8px;
background:#f2f2f2;
}

#via{
padding:10px;
font-size:16px;
border-radius:25px;
border:1px solid #ccc;
}

#opzioni{
display:flex;
gap:6px;
}

#opzioni button{
flex:1;
padding:10px;
font-size:15px;
border-radius:25px;
border:1px solid #ccc;
background:white;
}

#raggioCerca{
display:flex;
gap:6px;
}

#raggioCerca select,
#raggioCerca button{
flex:1;
padding:10px;
font-size:15px;
border-radius:25px;
border:1px solid #ccc;
}

#map{
height:calc(100vh - 170px);
width:100%;
}

#settingsBtn{
position:absolute;
bottom:15px;
right:15px;
z-index:1000;
width:50px;
height:50px;
font-size:22px;
border-radius:50%;
border:none;
background:white;
}

#settings{
position:absolute;
bottom:80px;
right:15px;
background:white;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
display:none;
}

#settings button{
width:100%;
padding:8px;
margin-top:5px;
}

</style>
</head>

<body>

<div id="controls">

<input id="via" placeholder="Cerca indirizzo">

<div id="opzioni">
<button id="gpsBtn">Vicino a me</button>
<button id="casaBtn">Casa</button>
<button id="lavoroBtn">Lavoro</button>
</div>

<div id="raggioCerca">
<select id="raggio">
<option value="50">50 m</option>
<option value="100">100 m</option>
<option value="150">150 m</option>
</select>
<button id="cercaBtn">Cerca</button>
</div>

</div>

<div id="map"></div>

<button id="settingsBtn">⚙</button>

<div id="settings">
<button id="salvaCasa">Salva come Casa</button>
<button id="salvaLavoro">Salva come Lavoro</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([41.9,12.5],16);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap" }
).addTo(map);

let puntoUtente=null;
let cerchioRaggio=null;
let markers=[];
let ultimaPosizione=null;


function aggiornaPunto(lat,lng){

if(puntoUtente) map.removeLayer(puntoUtente);

puntoUtente=L.circleMarker(
[lat,lng],
{
radius:8,
fillColor:"#007aff",
color:"#fff",
weight:2,
fillOpacity:1
}
).addTo(map);

map.panTo([lat,lng]);

ultimaPosizione={lat,lng};

}



function distanzaMetri(lat1,lng1,lat2,lng2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}



function pulisci(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

if(cerchioRaggio){
map.removeLayer(cerchioRaggio);
cerchioRaggio=null;
}

}



function generaParcheggi(lat,lng){

return[
{lat:lat+0.00018,lng:lng+0.00002},
{lat:lat-0.00020,lng:lng+0.00004},
{lat:lat+0.00045,lng:lng-0.00002}
];

}



function disegnaParcheggi(lat,lng){

const raggio=Number(document.getElementById("raggio").value);

pulisci();

cerchioRaggio=L.circle(
[lat,lng],
{
radius:raggio,
fillColor:"#3388ff",
fillOpacity:0.15,
color:null
}
).addTo(map);

const parcheggi=generaParcheggi(lat,lng);

parcheggi.forEach(p=>{

const dist=distanzaMetri(lat,lng,p.lat,p.lng);

if(dist<=raggio){

const marker=L.circleMarker(
[p.lat,p.lng],
{
radius:7,
fillColor:"green",
color:"#000",
weight:1,
fillOpacity:0.9
}
).addTo(map);

markers.push(marker);

}

});

}



function cerca(lat,lng){

aggiornaPunto(lat,lng);
disegnaParcheggi(lat,lng);

}



async function cercaIndirizzo(indirizzo){

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(indirizzo)}`;

const res=await fetch(url);

const data=await res.json();

if(data.length===0){
alert("Indirizzo non trovato");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

cerca(lat,lon);

}



document.getElementById("via").addEventListener("keypress",function(e){

if(e.key==="Enter"){

const indirizzo=this.value.trim();

if(indirizzo!==""){
cercaIndirizzo(indirizzo);
}

}

});



document.getElementById("cercaBtn").onclick=()=>{

if(ultimaPosizione){
cerca(ultimaPosizione.lat,ultimaPosizione.lng);
}

};



document.getElementById("gpsBtn").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

cerca(
pos.coords.latitude,
pos.coords.longitude
);

});

};



document.getElementById("casaBtn").onclick=()=>{

const casa=JSON.parse(localStorage.getItem("casa"));

if(casa){
cerca(casa.lat,casa.lng);
}

};



document.getElementById("lavoroBtn").onclick=()=>{

const lavoro=JSON.parse(localStorage.getItem("lavoro"));

if(lavoro){
cerca(lavoro.lat,lavoro.lng);
}

};



const settings=document.getElementById("settings");

document.getElementById("settingsBtn").onclick=()=>{

settings.style.display=
settings.style.display==="none"
? "block"
: "none";

};



document.getElementById("salvaCasa").onclick=()=>{

if(ultimaPosizione){

localStorage.setItem(
"casa",
JSON.stringify(ultimaPosizione)
);

alert("Casa salvata");

}

};



document.getElementById("salvaLavoro").onclick=()=>{

if(ultimaPosizione){

localStorage.setItem(
"lavoro",
JSON.stringify(ultimaPosizione)
);

alert("Lavoro salvato");

}

};

</script>

</body>
</html>
