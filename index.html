#terzaRiga{

#gpsBtn{
flex:1;

border:1px solid #ccc;

}

#settings{

#settings input{
width:100%;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ccc;
}

#addPlace{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
background:#eee;
cursor:pointer;
}

#risultati{
position:absolute;
bottom:20px;
left:10px;
padding:10px;
background:rgba(255,255,255,0.9);
z-index:2000;
font-size:16px;
}

#posizioneBtn{
position:absolute;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;

font-size:22px;
cursor:pointer;
z-index:2000;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

#navigazione{

}

#vaiParcheggio{
width:100%;
padding:12px;
border-radius:20px;
border:none;
background:#28a745;

#parcheggioBox {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;

#parcheggioBox button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

#vaiParcheggio {
  background-color: #28a745; /* verde */
  color: white;
}

#infoParcheggioBtn {
  background-color: #007aff; /* blu */
  color: white;
}

#infoParcheggio {
  display: none;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background-color: rgba(255,255,255,0.95);
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div id="controls">

<div style="display:flex;gap:6px;">
<input id="via" placeholder="Cerca indirizzo">
<button id="cercaBtnRiga1">Cerca</button>
</div>

<div id="luoghiBarWrapper">
<div id="luoghiBar"></div>
<div id="luoghiBtnMenu">Luoghi preferiti</div>
</div>

<div id="terzaRiga">
<button id="gpsBtn">Vicino a me</button>

<select id="raggio">
<option value="50">Raggio 50 m</option>
<option value="100">Raggio 100 m</option>
<option value="150">Raggio 150 m</option>
</select>
</div>

</div>

<div id="map"></div>

<div id="risultati"></div>

<div id="navigazione" style="display:none; flex-direction:column; gap:6px;">
  <button id="vaiParcheggio">Portami al parcheggio</button>
  <button id="infoParcheggioBtn">Informazioni parcheggio</button>

  <div id="infoParcheggio" style="display:none; padding:10px; border:1px solid #ccc; border-radius:8px;">
    <p><b>Stato:</b> <span id="statoParcheggio"></span></p>
    <p><b>Tipo:</b> <span id="tipoParcheggio"></span></p>
    <p><b>Descrizione:</b> <span id="descrizioneParcheggio"></span></p>
  </div>
</div>

<div id="settings">
<input id="nomeLuogo" placeholder="Nome luogo">
<input id="indirizzoLuogo" placeholder="Indirizzo">
<button id="addPlace">Aggiungi luogo</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const BACKEND_URL = postgresql://smart_parking_db_7jlq_user:Pn5V9Pms5TsTJycTozbQqCT91aWipUyH@dpg-d6nejnfgi27c73cdc69g-a.frankfurt-postgres.render.com/smart_parking_db_7jlq;
let map = L.map("map").setView([41.9,12.5],16);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

let markers=[];
let cerchio=null;
let parcheggioSelezionato=null;

let puntoAttuale=null;
let cerchioAttuale=null;

let centroSelezionato=null;
let gpsAttivo=false;

let luoghi=JSON.parse(localStorage.getItem("luoghi")||"[]");

function resetRicerca(){

/* rimuove marker parcheggi */

markers.forEach(m=>map.removeLayer(m));
markers=[];

/* rimuove cerchio indirizzo */

if(cerchio){
map.removeLayer(cerchio);
cerchio=null;
}

/* rimuove cerchio GPS */

if(cerchioAttuale){
map.removeLayer(cerchioAttuale);
cerchioAttuale=null;
}

/* rimuove punto GPS */

if(puntoAttuale){
map.removeLayer(puntoAttuale);
puntoAttuale=null;
}

/* rimuove punto indirizzo */

if(punto){
map.removeLayer(punto);
punto=null;
}

/* reset selezione parcheggio */

parcheggioSelezionato=null;

document.getElementById("navigazione").style.display="none";

}

/* GPS */

document.getElementById("gpsBtn").onclick=()=>{

resetRicerca();

if(!navigator.geolocation)
return alert("GPS non disponibile");

gpsAttivo=true;

document.getElementById("gpsBtn").classList.add("attivo");
document.querySelectorAll(".luogoBtn").forEach(b=>b.classList.remove("attivo"));

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

centroSelezionato={lat,lng,tipo:"gps"};

if(puntoAttuale)
puntoAttuale.setLatLng([lat,lng]);
else
puntoAttuale=L.circleMarker([lat,lng],
{radius:8,color:"white",fillColor:"#007aff",fillOpacity:1}
).addTo(map);

const raggio=Number(document.getElementById("raggio").value);

if(cerchioAttuale){
cerchioAttuale.setLatLng([lat,lng]);
cerchioAttuale.setRadius(raggio);
}else{
cerchioAttuale=L.circle([lat,lng],
{radius:raggio,fillColor:"#007aff",fillOpacity:0.15,color:"green",weight:4}
).addTo(map);
}

disegnaParcheggi(lat,lng);

map.panTo([lat,lng]);

});

};

/* RAGGIO */

document.getElementById("raggio").onchange=()=>{

const raggio=Number(document.getElementById("raggio").value);

if(!centroSelezionato) return;

if(centroSelezionato.tipo==="gps"){

if(cerchioAttuale)
cerchioAttuale.setRadius(raggio);

disegnaParcheggi(centroSelezionato.lat,centroSelezionato.lng);

}else{

if(cerchio)
cerchio.setRadius(raggio);

disegnaParcheggi(centroSelezionato.lat,centroSelezionato.lon);

}

};

/* distanza */

function distanza(lat1,lng1,lat2,lng2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* parcheggi demo */

function generaParcheggi(lat,lng){

let arr=[];

for(let i=0;i<15;i++){

arr.push({
lat:lat+(Math.random()-0.5)/2000,
lng:lng+(Math.random()-0.5)/2000,
libero:Math.random()>0.4
});

}

return arr;

}

/* disegna parcheggi dal backend */
async function disegnaParcheggi(lat,lng){

    // pulisce vecchi marker
    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    const raggio=Number(document.getElementById("raggio").value);

    if(centroSelezionato.tipo!=="gps"){

        if(cerchio)
            cerchio.setLatLng([lat,lng]).setRadius(raggio);
        else
            cerchio=L.circle([lat,lng],
            {radius:raggio,fillColor:"#3388ff",fillOpacity:0.15,color:"green",weight:4}
            ).addTo(map);

    }

    // --- fetch parcheggi dal backend ---
    let parcheggi = [];
    try {
        let viaBackend = "";
        if(centroSelezionato.tipo === "indirizzo") {
            viaBackend = `${lat},${lng}`; // coord da indirizzo
        } else if(centroSelezionato.tipo === "gps") {
            viaBackend = `${lat},${lng}`; // coord da GPS
        }
        const response = await fetch(`${BACKEND_URL}/parcheggi/vicini?lat=${lat}&lng=${lng}&raggio=${raggio}`);
        const data = await response.json();
        parcheggi = data.parcheggi;
    } catch(e) {
        console.error("Errore nel recupero parcheggi:", e);
    }
    // disegnaParcheggi--------------------------------------

let tot = 0;
let liberi = 0;

parcheggi.forEach(p => {

    const dist = distanza(lat, lng, p.lat, p.lng);

    if(dist <= raggio) {

        tot++;
        if(p.stato === "libero") liberi++;

        // colore iniziale in base allo stato
        let coloreIniziale = (p.stato === "libero") ? "green" : "red";

        const marker = L.circleMarker(
            [p.lat, p.lng],
            { radius: 5, fillColor: coloreIniziale, color: "#000", fillOpacity: 0.9 } // puntini più piccoli
        ).addTo(map);

        marker.pColorDefault = coloreIniziale; // salva il colore dello stato
        marker.pTypeColor = (p.tipo === "blu") ? "blue" :
                            (p.tipo === "giallo") ? "goldenrod" :
                            (p.tipo === "bianco") ? "white" : "gray";

        marker.on("click", () => {
            // reset marker precedenti
            markers.forEach(m => {
                if(m !== marker) {
                    m.setStyle({ fillColor: m.pColorDefault, radius: 5 });
                }
            });

            // evidenzia marker cliccato
            marker.setStyle({ fillColor: marker.pTypeColor, radius: 7 });

            parcheggioSelezionato = {
                lat: p.lat,
                lng: p.lng,
                stato: p.stato,
                tipo: p.tipo,
                descrizione: p.descrizione
            };

            // mostra contenitore info
            document.getElementById("navigazione").style.display = "flex";

            // nasconde info inizialmente
            document.getElementById("infoParcheggio").style.display = "none";

            // aggiorna contenuti info
            const statoEl = document.getElementById("statoParcheggio");
            const tipoEl = document.getElementById("tipoParcheggio");
            const descEl = document.getElementById("descrizioneParcheggio");

            // Stato
            statoEl.textContent = p.stato;
            statoEl.style.color = (p.stato === "libero") ? "green" : "red";

            // Tipo
            let tipoTesto = "", tipoColore = "";
            if(p.tipo === "blu") {
                tipoTesto = "A pagamento";
                tipoColore = "blue";
            } else if(p.tipo === "giallo") {
                tipoTesto = "Categoria specifica";
                tipoColore = "goldenrod";
            } else if(p.tipo === "bianco") {
                tipoTesto = "Gratuito";
                tipoColore = "black";
            } else {
                tipoTesto = p.tipo;
                tipoColore = "gray";
            }
            tipoEl.textContent = tipoTesto;
            tipoEl.style.color = tipoColore;

            // Descrizione
            descEl.textContent = (p.tipo === "bianco") ? "" : p.descrizione;
        });

        markers.push(marker);
    }

});

document.getElementById("infoParcheggioBtn").onclick = ()=>{
    const infoDiv = document.getElementById("infoParcheggio");
    infoDiv.style.display = (infoDiv.style.display === "none") ? "block" : "none";
};

    document.getElementById("risultati").innerHTML=
        "Parcheggi totali: "+tot+"<br>Parcheggi liberi: "+liberi;

}

/* punto indirizzo */

let punto=null;

function aggiornaPunto(lat,lng){

document.getElementById("gpsBtn").classList.remove("attivo");
gpsAttivo=false;

if(!punto)
punto=L.circleMarker([lat,lng],
{radius:8,color:"white",fillColor:"#007aff",fillOpacity:1}
).addTo(map);
else
punto.setLatLng([lat,lng]);

punto.bringToFront();

}

/* cerca indirizzo */

async function cercaIndirizzo(ind){

resetRicerca();

document.getElementById("gpsBtn").classList.remove("attivo");
gpsAttivo=false;
/* rimuove il cerchio GPS */

if(cerchioAttuale){
map.removeLayer(cerchioAttuale);
cerchioAttuale=null;
}

if(puntoAttuale){
map.removeLayer(puntoAttuale);
puntoAttuale=null;
}

const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(ind);

const res=await fetch(url);
const data=await res.json();

if(data.length==0){
alert("Indirizzo non trovato");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

centroSelezionato={lat,lon,tipo:"indirizzo"};

aggiornaPunto(lat,lon);

map.setView([lat,lon],16);

disegnaParcheggi(lat,lon);

}

/* eventi */

document.getElementById("cercaBtnRiga1").onclick=()=>{

const v=document.getElementById("via").value.trim();

if(v!="") cercaIndirizzo(v);

};

/* luoghi */

function aggiornaLuoghi(){

const bar=document.getElementById("luoghiBar");
bar.innerHTML="";

luoghi.forEach((l,i)=>{

const btn=document.createElement("div");
btn.className="luogoBtn";

/* nome luogo */

const nome=document.createElement("span");
nome.textContent=l.nome;

/* icona modifica */

const edit=document.createElement("span");
edit.textContent=" ✏️";
edit.style.cursor="pointer";

/* icona elimina */

const del=document.createElement("span");
del.textContent=" 🗑";
del.style.cursor="pointer";

/* clic sul luogo */

nome.onclick=()=>{

cercaIndirizzo(l.indirizzo);

document.querySelectorAll(".luogoBtn").forEach(b=>b.classList.remove("attivo"));
btn.classList.add("attivo");

};

/* modifica luogo */

edit.onclick=(e)=>{

e.stopPropagation();

let nuovoNome=prompt("Nuovo nome",l.nome);
let nuovoIndirizzo=prompt("Nuovo indirizzo",l.indirizzo);

if(nuovoNome && nuovoIndirizzo){

luoghi[i]={nome:nuovoNome,indirizzo:nuovoIndirizzo};

localStorage.setItem("luoghi",JSON.stringify(luoghi));

aggiornaLuoghi();

}

};

/* elimina luogo */

del.onclick=(e)=>{

e.stopPropagation();

if(confirm("Eliminare questo luogo?")){

luoghi.splice(i,1);

localStorage.setItem("luoghi",JSON.stringify(luoghi));

aggiornaLuoghi();

}

};

btn.appendChild(nome);
btn.appendChild(edit);
btn.appendChild(del);

bar.appendChild(btn);

});

}

document.getElementById("addPlace").onclick=()=>{

const nome=document.getElementById("nomeLuogo").value.trim();
const indirizzo=document.getElementById("indirizzoLuogo").value.trim();

if(!nome || !indirizzo) return;

luoghi.push({nome,indirizzo});

localStorage.setItem("luoghi",JSON.stringify(luoghi));

aggiornaLuoghi();

document.getElementById("settings").style.display="none";

};

document.getElementById("luoghiBtnMenu").onclick=()=>{

const s=document.getElementById("settings");

s.style.display = s.style.display==="none"?"block":"none";

};

aggiornaLuoghi();

document.getElementById("vaiParcheggio").onclick=()=>{

if(!parcheggioSelezionato) return;

const lat=parcheggioSelezionato.lat;
const lng=parcheggioSelezionato.lng;

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng,
"_blank"
);

};


</script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</body>
