<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ricerca Parcheggi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{margin:0;font-family:sans-serif;}
#map{height:100vh;}

#controls{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:2000;
display:flex;
flex-direction:column;
gap:6px;
}

/* Riga 1 */

#via{
padding:10px;
font-size:16px;
border-radius:25px;
border:1px solid #ccc;
background:rgba(255,255,255,0.85);
}

#cercaBtnRiga1{
padding:10px;
border-radius:25px;
border:1px solid #ccc;
background:#007aff;
color:white;
cursor:pointer;
}

/* Riga 2 */

#luoghiBarWrapper{
display:flex;
align-items:center;
gap:6px;
overflow:hidden;
}

#luoghiBar{
display:flex;
gap:6px;
overflow-x:auto;
}

.luogoBtn{
padding:8px 14px;
border-radius:20px;
border:1px solid #ccc;
background:rgba(255,255,255,0.85);
white-space:nowrap;
cursor:pointer;
}

.luogoBtn.attivo{
border:3px solid green;
}

#luoghiBtnMenu{
flex-shrink:0;
padding:8px 12px;
border-radius:20px;
border:1px solid #ccc;
background:rgba(240,240,240,0.9);
cursor:pointer;
white-space:nowrap;
}

/* Riga 3 */

#terzaRiga{
display:flex;
gap:8px;
}

#gpsBtn{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

#gpsBtn.attivo{
border:3px solid green;
}

#raggio{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
background:white;
}

/* popup */

#settings{
position:absolute;
top:120px;
right:10px;
background:white;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
display:none;
z-index:2000;
width:250px;
}

#settings input{
width:100%;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ccc;
}

#addPlace{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
background:#eee;
cursor:pointer;
}

#risultati{
position:absolute;
bottom:20px;
left:10px;
padding:10px;
background:white;
z-index:2000;
font-size:16px;
border-radius:10px;
}

/* pulsante posizione */

#posizioneBtn{
position:absolute;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
border:none;
background:white;
font-size:22px;
cursor:pointer;
z-index:2000;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* navigazione */

#navigazione{
position:absolute;
bottom:90px;
left:10px;
right:10px;
z-index:2000;
display:none;
}

#vaiParcheggio{
width:100%;
padding:12px;
border-radius:20px;
border:none;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="controls">

<div style="display:flex;gap:6px;">
<input id="via" placeholder="Cerca indirizzo">
<button id="cercaBtnRiga1">Cerca</button>
</div>

<div id="luoghiBarWrapper">
<div id="luoghiBar"></div>
<div id="luoghiBtnMenu">Luoghi preferiti</div>
</div>

<div id="terzaRiga">
<button id="gpsBtn">Vicino a me</button>

<select id="raggio">
<option value="50">Raggio 50 m</option>
<option value="100">Raggio 100 m</option>
<option value="150">Raggio 150 m</option>
</select>
</div>

</div>

<div id="map"></div>

<div id="risultati"></div>

<div id="navigazione">
<button id="vaiParcheggio">Portami al parcheggio</button>
</div>

<button id="posizioneBtn">📍</button>

<div id="settings">
<input id="nomeLuogo" placeholder="Nome luogo">
<input id="indirizzoLuogo" placeholder="Indirizzo">
<button id="addPlace">Aggiungi luogo</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map=L.map("map").setView([41.9,12.5],16);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);

let markers=[];
let cerchio=null;
let puntoAttuale=null;
let centroSelezionato=null;
let parcheggioSelezionato=null;

let luoghi=JSON.parse(localStorage.getItem("luoghi")||"[]");

/* distanza */

function distanza(lat1,lng1,lat2,lng2){
const R=6371000;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;
const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

/* parcheggi demo */

function generaParcheggi(lat,lng){
let arr=[];
for(let i=0;i<15;i++){
arr.push({
lat:lat+(Math.random()-0.5)/2000,
lng:lng+(Math.random()-0.5)/2000,
libero:Math.random()>0.4
});
}
return arr;
}

/* disegna parcheggi */

function disegnaParcheggi(lat,lng){

markers.forEach(m=>map.removeLayer(m));
markers=[];

const raggio=Number(document.getElementById("raggio").value);

if(cerchio)
cerchio.setLatLng([lat,lng]).setRadius(raggio);
else
cerchio=L.circle([lat,lng],{radius:raggio,color:"green",fillOpacity:0.1}).addTo(map);

const parcheggi=generaParcheggi(lat,lng);

let tot=0;
let liberi=0;

parcheggi.forEach(p=>{

const dist=distanza(lat,lng,p.lat,p.lng);

if(dist<=raggio){

tot++;

if(p.libero) liberi++;

const marker=L.circleMarker([p.lat,p.lng],
{radius:7,fillColor:p.libero?"green":"red",color:"#000",fillOpacity:0.9}).addTo(map);

if(p.libero){

marker.on("click",()=>{

parcheggioSelezionato={lat:p.lat,lng:p.lng};

document.getElementById("navigazione").style.display="block";

});

}

markers.push(marker);

}

});

document.getElementById("risultati").innerHTML=
"Parcheggi totali: "+tot+"<br>Parcheggi liberi: "+liberi;

}

/* cerca indirizzo */

async function cercaIndirizzo(ind){

const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(ind);

const res=await fetch(url);
const data=await res.json();

if(data.length==0){
alert("Indirizzo non trovato");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

centroSelezionato={lat,lon};

map.setView([lat,lon],16);

disegnaParcheggi(lat,lon);

}

document.getElementById("cercaBtnRiga1").onclick=()=>{
const v=document.getElementById("via").value.trim();
if(v!="") cercaIndirizzo(v);
};

/* navigazione */

document.getElementById("vaiParcheggio").onclick=()=>{

if(!parcheggioSelezionato) return;

const lat=parcheggioSelezionato.lat;
const lng=parcheggioSelezionato.lng;

window.open("https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng,"_blank");

};

/* posizione */

document.getElementById("posizioneBtn").onclick=()=>{

if(!navigator.geolocation) return;

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],17);

if(!puntoAttuale){
puntoAttuale=L.circleMarker([lat,lng],
{radius:8,color:"white",fillColor:"#007aff",fillOpacity:1}).addTo(map);
}else{
puntoAttuale.setLatLng([lat,lng]);
}

});

};

</script>

</body>
</html>
